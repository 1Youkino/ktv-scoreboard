<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f4ef" />
    <title>K歌计分</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">KTV SCOREBOARD</p>
          <h1>K歌计分</h1>
        </div>
        <button class="icon-button" id="resetButton" type="button" title="清空全部数据" aria-label="清空全部数据">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 6h18M8 6V4h8v2m-9 0 1 14h8l1-14M10 10v6m4-6v6" />
          </svg>
        </button>
      </header>

      <nav class="view-tabs" aria-label="页面切换">
        <button class="tab-button is-active" type="button" data-view="scoring">录分</button>
        <button class="tab-button" type="button" data-view="ranking">
          排名
          <span class="tab-count" id="playerCount">0</span>
        </button>
      </nav>

      <main>
        <section class="view is-active" id="scoringView">
          <section class="panel player-panel">
            <div class="section-heading">
              <div>
                <p class="section-kicker">PLAYERS</p>
                <h2>歌手</h2>
              </div>
              <span class="section-count" id="singerCountLabel">0 人</span>
            </div>

            <form class="add-player-form" id="playerForm">
              <label class="field-label sr-only" for="playerName">姓名</label>
              <input id="playerName" name="playerName" type="text" maxlength="16" autocomplete="off" placeholder="输入姓名" required />
              <button class="primary-button compact" type="submit">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
                添加
              </button>
            </form>
            <div class="player-chips" id="playerChips" aria-live="polite"></div>
          </section>

          <section class="panel score-panel">
            <div class="section-heading">
              <div>
                <p class="section-kicker">NEW SCORE</p>
                <h2 id="scoreFormTitle">录入成绩</h2>
              </div>
              <button class="text-button is-hidden" id="cancelEditButton" type="button">取消修改</button>
            </div>

            <form id="scoreForm">
              <div class="form-grid">
                <label class="field-group">
                  <span class="field-label">歌手</span>
                  <span class="select-wrap">
                    <select id="scorePlayer" name="scorePlayer" required>
                      <option value="">先添加歌手</option>
                    </select>
                  </span>
                </label>
                <label class="field-group">
                  <span class="field-label">歌名</span>
                  <input id="songName" name="songName" type="text" maxlength="40" autocomplete="off" placeholder="例如：晴天" required />
                </label>
                <label class="field-group score-input-group">
                  <span class="field-label">分数</span>
                  <span class="score-input-wrap">
                    <input id="scoreValue" name="scoreValue" type="number" inputmode="decimal" min="0" max="100" step="0.1" placeholder="0-100" required />
                    <span>分</span>
                  </span>
                </label>
              </div>
              <button class="primary-button submit-score" id="submitScoreButton" type="submit">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m5 13 4 4L19 7" /></svg>
                保存成绩
              </button>
            </form>
          </section>

          <section class="history-section">
            <div class="section-heading history-heading">
              <div>
                <p class="section-kicker">RECENT</p>
                <h2>成绩记录</h2>
              </div>
              <span class="section-count" id="entryCountLabel">0 首</span>
            </div>
            <div class="empty-state" id="historyEmpty">
              <div class="empty-icon">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M9 18V5l10-2v13M9 9l10-2M6 21c1.66 0 3-1.12 3-2.5S7.66 16 6 16s-3 1.12-3 2.5S4.34 21 6 21Zm10-2c1.66 0 3-1.12 3-2.5S17.66 14 16 14s-3 1.12-3 2.5 1.34 2.5 3 2.5Z" /></svg>
              </div>
              <p>还没有成绩</p>
            </div>
            <div class="score-list" id="scoreList"></div>
          </section>
        </section>

        <section class="view" id="rankingView">
          <section class="ranking-hero">
            <div>
              <p class="section-kicker">LEADERBOARD</p>
              <h2>今晚排名</h2>
            </div>
            <button class="secondary-button" id="shareButton" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 16V3m0 0L7 8m5-5 5 5M5 13v7h14v-7" /></svg>
              分享
            </button>
          </section>

          <div class="ranking-summary" aria-label="比赛统计">
            <div><strong id="summaryPlayers">0</strong><span>歌手</span></div>
            <div><strong id="summarySongs">0</strong><span>歌曲</span></div>
            <div><strong id="summaryAverage">—</strong><span>全场均分</span></div>
          </div>

          <div class="empty-state ranking-empty" id="rankingEmpty">
            <div class="empty-icon trophy">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M8 4h8v5a4 4 0 0 1-8 0V4Zm4 9v4m-4 3h8M8 6H4v2a4 4 0 0 0 4 4m8-6h4v2a4 4 0 0 1-4 4" /></svg>
            </div>
            <p>录入成绩后生成排名</p>
          </div>
          <ol class="ranking-list" id="rankingList"></ol>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <dialog id="confirmDialog">
      <form method="dialog" class="dialog-card">
        <div class="dialog-icon">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.3 3.8 2.6 17.2A2 2 0 0 0 4.3 20h15.4a2 2 0 0 0 1.7-2.8L13.7 3.8a2 2 0 0 0-3.4 0Z" /></svg>
        </div>
        <h2 id="dialogTitle">确认清空？</h2>
        <p id="dialogMessage">全部歌手和成绩都会被删除。</p>
        <div class="dialog-actions">
          <button class="secondary-button" value="cancel">取消</button>
          <button class="danger-button" id="dialogConfirmButton" value="confirm">确认删除</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
